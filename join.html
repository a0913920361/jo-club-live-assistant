    <style>
      :root {
        color-scheme: dark;
        --bg: #070810;
        --card: rgba(10, 12, 22, 0.72);
        --line: rgba(166, 255, 69, 0.8);
        --text: #f8f8f8;
        --muted: rgba(248, 248, 248, 0.72);
        --lime: #a6ff45;
        --cyan: #27ebff;
        --pink: #ff3d9a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        padding: 22px;
        font-family:
          "Microsoft JhengHei UI",
          "PingFang TC",
          system-ui,
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 15%, rgba(255, 61, 154, 0.26), transparent 34%),
          radial-gradient(circle at 88% 16%, rgba(39, 235, 255, 0.2), transparent 32%),
          radial-gradient(circle at 52% 100%, rgba(166, 255, 69, 0.2), transparent 38%),
          var(--bg);
      }

      .join-wrap {
        width: min(100%, 520px);
        text-align: center;
      }

      .invite-card {
        display: block;
        overflow: hidden;
        border: 2px solid rgba(39, 235, 255, 0.6);
        border-radius: 28px;
        background: var(--card);
        box-shadow:
          0 0 34px rgba(39, 235, 255, 0.2),
          0 22px 70px rgba(0, 0, 0, 0.45);
      }

      .invite-card img {
        display: block;
        width: 100%;
        height: auto;
      }

      .cta {
        display: block;
        margin-top: 18px;
        padding: 18px 22px;
        border-radius: 999px;
        color: #070810;
        font-size: 20px;
        font-weight: 900;
        line-height: 1.2;
        text-decoration: none;
        background: linear-gradient(90deg, var(--lime), var(--cyan));
        box-shadow: 0 0 26px rgba(166, 255, 69, 0.28);
      }

      .note {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .brand {
        margin: 0 0 14px;
        color: var(--cyan);
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0;
      }

      @media (max-width: 420px) {
        body {
          padding: 12px;
        }

        .invite-card {
          border-radius: 22px;
        }

        .cta {
          font-size: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="join-wrap">
      <p class="brand">JO CLUB 中原揪咖入口</p>
      <a class="invite-card" href="https://lin.ee/65nkoOl" aria-label="加入 JO CLUB 官方 LINE">
        <img
          src="./assets/jo-club-invite-card-youth.jpg"
          alt="JO CLUB 揪咖邀請卡，麻將、德州、喝酒、玩牌、包廂聚會"
        />
      </a>
      <a class="cta" href="https://lin.ee/65nkoOl">點我加入官方，今晚直接開揪</a>
      <p class="note">分享這個頁面網址給朋友，對方看到預覽圖後點進來就能加入官方。</p>
    </main>
  </body>
</html>
